    "Escape velocity is the threshold at which a startup breaks free from the gravitational pull of early-stage fragility and begins compounding — where growth becomes self-reinforcing, the team can execute without heroics, and the business has the infrastructure to scale. It requires all three pillars (Technology, Product, Business Operations) to be functional enough to stop fighting the basics.",
    "The concept names the target state that LiminalFoundry's entire model is oriented toward. It reframes the founder's challenge from 'build a product' to 'build a company that can sustain itself' — which requires a fundamentally different set of decisions.",
    ["Orienting a new founder: Frame what we're building toward, not just what we're fixing today.",
     "Prioritization: 'Which of these is blocking escape velocity?' cuts through the noise.",
     "Progress assessment: Has recent work moved us closer to escape velocity — or just kept us busy?"],
    "Every company needs three things to reach escape velocity — and most early-stage companies have one, maybe two. — LiminalFoundry",
    ['The Three-Pillar Model','The Gap Diagnosis','Product-Market Fit']) },

  { id:'tam-sam-som', name:'TAM / TOM / SAM / SOM', cat:'model', tier:'A', broad:['strategy','finance'], specific:['market-sizing','icp','revenue-model'], oneLiner:"Market sizing at four levels — from full theoretical opportunity to realistic near-term capture.", detail: D(
    "TAM (Total Addressable Market) is the full theoretical opportunity. TOM (Total Obtainable Market) is what could be reached with ideal execution. SAM (Serviceable Addressable Market) is the portion your business model can actually serve. SOM (Serviceable Obtainable Market) is what you can realistically capture given resources and competition.",
    "Market sizing done well answers whether the opportunity is large enough to build a significant business. Done poorly, it becomes investor theater. SOM matters most for near-term planning; TAM matters for the investment narrative. Build it bottom-up, present it clearly.",
    ["Top-down vs. bottom-up: Top-down (big market × small %) impresses no one. Bottom-up (ICP count × spend × win rate) is what matters.",
     "Fundraising: Every investor deck needs market sizing. Build it bottom-up, present it clearly.",
     "GTM prioritization: SAM identifies the realistic target universe; SOM defines the first-wave focus."],
    "Market sizing: TAM, TOM, SAM, SOM — appears in both Product and Business Operations pillars. It belongs to both. — LiminalFoundry",
    ['ICP','Market Sizing','Revenue Model']) },

  // ── FRAMEWORKS ──────────────────────────────────────────────────────────
  { id:'three-pillar-model', name:'The Three-Pillar Model', cat:'framework', tier:'S', lf:true, broad:['strategy','execution','product','technology'], specific:['capabilities-assessment','value-proposition','go-to-market'], author:'LiminalFoundry', oneLiner:"Technology + Product + Business Operations — the three things every company needs to reach escape velocity.", detail: D(
    "Every startup needs three things to reach escape velocity: Technology (a solution that can be built and evolved without heroics), Product (a clear value proposition, repeatable GTM, and customers who understand why they're buying), and Business Operations (the organizational and financial infrastructure to execute today while building toward a longer horizon). Most early-stage companies have one, maybe two.",
    "The gap between a good idea and a working business is almost never about the idea — it's about the ability to execute across all three pillars simultaneously. The Three-Pillar Model is LiminalFoundry's primary diagnostic framework — the lens used to assess where a company stands and where the critical gaps are.",
    ["First conversation with a new founder: Map the three pillars. Identify which is strongest, which is weakest, what the current ceiling is.",
     "Capabilities assessment: The model structures the assessment across the full system, not just the part the founder cares about.",
     "Prioritization: When everything feels urgent, the Three-Pillar Model identifies which gap is the true constraint.",
     "Positioning LiminalFoundry's value: Explains why embedded operating across all three pillars is more valuable than point-solution advising."],
    "The gap isn't always obvious from the inside. Diagnosing it honestly — and closing it quickly — is what we do. — LiminalFoundry",
    ['The Gap Diagnosis','Escape Velocity','Capabilities Assessment']) },

  { id:'gap-diagnosis', name:'The Gap Diagnosis', cat:'framework', tier:'S', lf:true, broad:['strategy','execution'], specific:['capabilities-assessment','value-proposition','technical-architecture'], author:'LiminalFoundry', oneLiner:"Four archetypes of what's missing — and what the right intervention looks like.", detail: D(
    "The Gap Diagnosis maps four common archetypes of early-stage capability gaps. Each describes a situation where one or two pillars are strong and a critical one is missing. Every founder fits one of these patterns. Naming the pattern quickly is the first step to closing the gap.",
    "Founders are often too close to their own situation to see the gap clearly. The Gap Diagnosis provides an outside-in diagnostic lens that cuts through founder narratives and identifies what's actually holding the company back.",
    ["'You built something. Now you need to sell it.' → Strong Technology, Thin Product. GTM is undefined, ICP is fuzzy, sales conversations don't convert.",
     "'You're peaking interest. Now you need to build.' → Strong Product, Thin Technology. Delivery is fragile, held together by heroics.",
     "'You have signal. Now you need a company.' → Strong Product + Technology, Thin Business Operations. No financial model, no cadence, no infrastructure.",
     "'Your MVP is validated. Now it needs to scale.' → Proof of concept, missing hyperscale engineering. Architecture wasn't built for what comes next."],
    "Every founder we work with has at least one of these — a technology solution, a product, or a business. Very few have all three. — LiminalFoundry",
    ['The Three-Pillar Model','Escape Velocity','Capabilities Assessment']) },

  { id:'now-near-far-fw', name:'Now / Near / Far Horizons', cat:'framework', tier:'A', lf:true, broad:['strategy','execution'], specific:['now-near-far','operating-cadence','exit-strategy'], author:'LiminalFoundry', oneLiner:"Planning horizon framework — Now (current), Near (6-18mo), Far (2-5yr vision).", detail: D(
    "Now/Near/Far organizes planning across three timeframes: Now (current state — what exists, what's urgent), Near (the next 6-18 months — the milestone we're building toward), and Far (the 2-5 year vision — where we're ultimately going). In LiminalFoundry's practice, Now and Near drive active documentation and decision-making, while Far informs direction without constraining execution.",
    "Most founders can only hold one time horizon at a time — and it's usually Now. The Now/Near/Far framework creates a shared language for holding all three simultaneously. It prevents whiplash between daily firefighting and 5-year vision without a middle layer.",
    ["Kickoff with a new company: Establish Now/Near/Far before anything else.",
     "Strategic planning: Use the framework to organize what belongs in which conversation.",
     "Investor conversations: Now/Near/Far maps naturally to 'here's where we are, here's what we're building toward, here's the vision.'",
     "Prioritization: 'What must happen now vs. what can wait?' — the Now/Near/Far lens answers it."],
    "All of these elements need to be considered on the 'now / near / far' horizons. — LiminalFoundry",
    ['Operating Cadence','OKRs','Exit Strategy']) },

  { id:'value-prop-canvas', name:'Value Proposition Canvas', cat:'framework', tier:'S', broad:['product','strategy'], specific:['value-proposition','go-to-market','customer-discovery'], author:'Alexander Osterwalder', oneLiner:"Map customer jobs, pains, and gains against your offer — and find where the fit actually breaks down.", detail: D(
    "The Value Proposition Canvas zooms into a single, critical question: does your value map fit your customer profile? It maps the customer's world — Jobs to Be Done, Pains, and Gains — against your offering: Products & Services, Pain Relievers, and Gain Creators. Fit happens when your Pain Relievers address real, important Pains and your Gain Creators connect to valued Gains. Most products fail not because of execution, but because the map doesn't match the profile.",
    "The canvas makes mismatches visible before they become expensive. It also forces alignment: product, sales, and marketing have to agree on the customer's reality before arguing about features. Filling it in from inside the building — without real customer discovery data — produces a value map no one asked for.",
    ["Pre-build: Validate that your offering connects to real jobs before writing a line of code.",
     "Stuck on messaging: If customers don't 'get it,' the canvas often reveals a mismatch between what you think you're solving and what they're experiencing.",
     "Team alignment: Use it as a forcing function to get product, sales, and marketing on the same page about who the customer actually is.",
     "After discovery rounds: Update the canvas to reflect what you actually heard — not what you assumed going in."],
    "There is no value in your product. Value is created in the mind of the customer. — Alexander Osterwalder",
    ['Jobs to Be Done','Business Model Canvas','Customer Discovery','The Mom Test']) },

  { id:'bmc', name:'Business Model Canvas', cat:'framework', tier:'S', broad:['strategy','product','finance'], specific:['value-proposition','go-to-market','fundraising','revenue-model'], author:'Alexander Osterwalder & Yves Pigneur', oneLiner:"Nine building blocks. One page. The clearest way to design and stress-test how a business creates, delivers, and captures value.", detail: D(
    "Nine interconnected building blocks on one page: Customer Segments, Value Propositions, Channels, Customer Relationships, and Revenue Streams on the right (customer-facing); Key Resources, Key Activities, Key Partnerships, and Cost Structure on the left (operational). Every block contains assumptions. The canvas is a hypothesis map, not a fact map — it makes your assumptions explicit so you can test them before you're committed.",
    "It replaced the 40-page business plan for early-stage work — not because detail doesn't matter, but because a visual, hypothesis-driven format surfaces gaps and forces clarity faster. Changing one block cascades into others, making strategic trade-offs visible before they become expensive. It's also the fastest way to get a founding team onto the same page about how the business actually works.",
    ["Pre-product: Sketch the business model before building anything. Make assumptions explicit so you can test them.",
     "Co-founder alignment: Get the model on one page before anyone writes code or spends money.",
     "Investor conversations: Use it to explain how your business creates, delivers, and captures value in a form investors can engage with quickly.",
     "Competitive analysis: Map competitors on the same canvas to see where your model is genuinely differentiated vs. where you're just hoping to be."],
    "A business model describes the rationale of how an organization creates, delivers, and captures value. — Alexander Osterwalder & Yves Pigneur",
    ['Value Proposition Canvas','Jobs to Be Done','Lean Startup','SaaS Metrics Framework']) },

  { id:'customer-discovery', name:'Customer Discovery', cat:'framework', tier:'S', broad:['product','strategy'], specific:['customer-discovery','product-market-fit','icp'], author:'Steve Blank', oneLiner:"Talk to customers before you build. No, really — before.", detail: D(
    "Customer Discovery is the disciplined process of getting out of the building and testing your assumptions about who your customer is and what problem they actually have — before you scale or fully build. It's the first phase of Steve Blank's Customer Development model.",
    "Every startup begins with assumptions — about the customer, the problem, the market, the channel. Most are wrong. Customer Discovery is the fastest, cheapest way to find out which ones. The failure mode isn't doing it wrong — it's skipping it entirely.",
    ["Pre-product: Validate the problem, customer segment, and willingness to pay before a prototype exists.",
     "Early product, no traction: Go back to Discovery. Something in your assumptions is wrong.",
     "Pivot decision: Run Discovery on the new hypothesis before committing.",
     "New market: Even with PMF in one segment, a new segment requires fresh Discovery."],
    "Get out of the building. — Steve Blank",
    ['The Mom Test','Jobs to Be Done','Lean Startup']) },

  { id:'wardley-mapping', name:'Wardley Mapping', cat:'framework', tier:'A', broad:['strategy','technology'], specific:['competitive-positioning','market-timing','platform-strategy','technical-architecture'], author:'Simon Wardley', oneLiner:"Map your value chain against evolution to see where to play, build, and watch.", detail: D(
    "Wardley Mapping plots business components against two axes: value chain (vertical) and evolution (horizontal, from genesis to commodity). The critical insight: everything evolves. What's custom-built today becomes a product, then a commodity, then a utility. Mapping reveals where you're competing, where to build vs. buy, and where disruption will come from.",
    "Most strategy frameworks are static. Wardley Maps are dynamic — they model movement and competitive pressure over time. They expose market assumptions, identify where to compete vs. buy, and predict disruption before incumbents see it coming.",
    ["Market entry: Map the space before committing. What's commoditizing? What's still novel?",
     "Build vs. buy: Genesis/custom = build. Product = buy. Commodity = use the utility.",
     "Competitive threats: Where will incumbents commoditize your position?",
     "Platform strategy: Identify which components will commoditize and could become ecosystem foundations."],
    "Without a map, you're navigating by gut. With one, you can see the terrain. — Simon Wardley",
    ['Simon Wardley',"Porter's Five Forces",'7 Powers']) },

  { id:'saas-metrics', name:'SaaS Metrics Framework', cat:'framework', tier:'A', broad:['finance','growth'], specific:['unit-economics','pricing','fundraising','revenue-model'], oneLiner:"The numbers that actually tell you if your SaaS business is working.", detail:null },

  { id:'three-horizons', name:'Three Horizons', cat:'framework', tier:'A', broad:['strategy','growth','leadership'], specific:['competitive-positioning','market-timing','now-near-far'], author:'Baghai, Coley & White', oneLiner:"Invest simultaneously across the current business, emerging bets, and future options — or you'll always be too late.", detail: D(
    "High-performing companies invest concurrently in three horizons: H1 (defending and extending the current business), H2 (building emerging businesses that will become the core in 2-5 years), and H3 (creating viable options for the future). The companies that wait until H1 is saturated before starting H2 always start too late. The framework is most useful not as a planning tool but as a portfolio allocation and conversation tool.",
    "Most early-stage founders collapse everything into H1 — survival mode, feature building, customer acquisition — and never think about H2 until they need a new growth engine. By then, there's no time to build one. The framework provides language for holding multiple time horizons simultaneously and makes resource allocation decisions explicit and discussable.",
    ["Strategic planning: Make explicit where attention and resources are being allocated across time — and whether H2 is being starved.",
     "Board/investor conversations: Reframes 'we're focused on the core' as a deliberate H1 bet, not a failure of vision.",
     "Team composition: Different horizons require different types of people. Don't use H1 operators on H3 exploration.",
     "M&A / partnerships: Clarify whether you're acquiring an H2 or H3 bet — matters significantly for how you integrate and manage it."],
    "The best companies manage all three horizons simultaneously. They defend their core business while nurturing new growth businesses and creating viable options for the future. — Baghai, Coley & White",
    ['Now / Near / Far Horizons',"The Innovator's Dilemma",'Wardley Mapping','Playing to Win']) },

  { id:'strategy-house', name:'Strategy House', cat:'framework', tier:'A', broad:['strategy','leadership','execution'], specific:['organizational-design','operating-cadence','now-near-far'], oneLiner:"Vision at the roof, priorities as pillars, culture at the foundation. How to make strategy visible and cascadeable.", detail: D(
    "A visual alignment framework that structures strategy as a house: Vision at the roof (where you're going and why it matters), Strategic Priorities as load-bearing pillars (the 3-5 things that carry the company to the roof), and Core Values/Capabilities as the foundation (the non-negotiables that define how work gets done). Some versions add a fourth layer beneath the pillars for Initiatives, OKRs, and metrics — the bridge from direction to execution.",
    "Most organizations fail in one of two ways: strategy stays at the executive level and never translates into work, or the team executes intensely without a shared picture of what the whole adds up to. The Strategy House solves both by making choices explicit and cascadeable. Critically: the act of building the house is the strategy conversation — you can't have seven pillars, you have to decide what matters.",
    ["Co-founder alignment: Before you're in execution, get the house on one page. If you can't fill it in, you don't have a strategy yet — you have a list of things you want to do.",
     "New team members: Give anyone joining a single artifact that shows how their work connects to the roof.",
     "Quarterly planning: The house is the stable frame; priorities and initiatives update within it.",
     "Investor narrative: The house makes your strategy readable without a deck — it shows coherence, not just ambition."],
    "Strategy is not a plan. It's a set of integrated choices that positions you to win. — Roger Martin",
    ['Playing to Win','OKRs','Good Strategy / Bad Strategy','Now / Near / Far Horizons']) },

  { id:'impact-mapping', name:'Impact Mapping', cat:'framework', tier:'A', broad:['product','strategy','execution'], specific:['go-to-market','organizational-design','customer-discovery'], author:'Gojko Adzic', oneLiner:"Connect goals to actors to behavior changes to deliverables — so you only build what actually moves the needle.", detail: D(
    "Impact Mapping connects business goals to actors (who influences the goal), impacts (what behavior changes are needed from those actors), and deliverables (what to build to enable those impacts). The rule is strict: a feature only belongs on the map if you can trace it through an impact, through an actor, to the goal. If you can't draw that line, don't build it.",
    "Most product roadmaps are lists of things to build, disconnected from the outcomes they're supposed to create. Impact Mapping keeps teams anchored to outcomes by making the goal explicit and visible at every planning session — and creates a principled filter against scope creep that sounds reasonable but isn't actually load-bearing.",
    ["Roadmap building: Only add items that trace through to a real impact on an actor that matters for the goal.",
     "Stakeholder alignment: When everyone can see the full map, priority disagreements become conversations about which actors or impacts matter most — not arguments about features.",
     "Sprint planning: Check whether the features in the upcoming sprint are attached to an impact worth having.",
     "After a goal changes: Remap the tree. Many branches may no longer apply — and it's better to find that out in planning than in delivery."],
    "Don't deliver features. Deliver impacts. — Gojko Adzic",
    ['OKRs','Jobs to Be Done','Value Proposition Canvas','Lean Startup']) },

  { id:'mom-test', name:'The Mom Test', cat:'book', tier:'S', broad:['product'], specific:['customer-discovery','product-market-fit','value-proposition','icp'], author:'Rob Fitzpatrick', oneLiner:"The manual for customer conversations that don't lie to you.", detail: D(
    "A short, tactical manual for having customer conversations that actually tell you the truth. Most founders accidentally run all their customer conversations like they're asking their mom — seeking validation rather than truth. This book fixes that with three rules: talk about their life instead of your idea, ask about specifics in the past, talk less and listen more.",
    "Customer validation is the most consistently botched activity in early-stage startups. Founders ask leading questions, get polite encouragement, and walk away thinking they have signal when they have noise. This book is the antidote — it's read in two hours and referenced constantly.",
    ["Before you build anything: Validate the problem in real conversations first.",
     "When customer conversations feel great but nothing converts: You're getting polite lies.",
     "When onboarding advisors: Ask about behavior, not opinions.",
     "Any time someone says 'I would definitely use that': That phrase is worth nothing."],
    "Talk about their life instead of your idea. Ask about specifics in the past. Talk less and listen more. — Rob Fitzpatrick",
    ['Jobs to Be Done','Customer Discovery','Paul Graham']) },

  { id:'christensen', name:'Clayton Christensen', cat:'thinker', tier:'S', broad:['strategy'], specific:['competitive-positioning','market-timing','moats'], oneLiner:"Innovator's Dilemma, JTBD — the academic who built frameworks founders actually use.", detail:null },

  { id:'simon-wardley', name:'Simon Wardley', cat:'thinker', tier:'A', broad:['strategy','technology'], specific:['competitive-positioning','market-timing','platform-strategy','technical-architecture'], oneLiner:"Creator of Wardley Mapping. The sharpest tool for visualizing strategic terrain.", detail: D(
    "Researcher and strategist who created Wardley Mapping while CEO of Fotango in the mid-2000s. His core contribution: bringing the concept of evolution into strategy — every component of a value chain is constantly evolving from novel to commodity, and understanding that movement is the entire game.",
    "One of the few strategy thinkers who built something first, then developed a framework from what he learned. Unusually generous — the entire body of work is free under Creative Commons. His thinking is most useful when you need to understand not where a market stands, but how it's moving.",
    ["When you need to understand how a market will shift, not just where it stands today.",
     "When making build vs. buy vs. partner decisions at scale.",
     "When designing platform or ecosystem strategy.",
     "When trying to identify where a disruptive entrant will attack from."],
    `The moment you have a map, you move from "what should we do?" to "given where we are, what can we do?" That's the entire shift. — Simon Wardley`,
    ['Wardley Mapping','Clayton Christensen','Richard Rumelt']) },

  { id:'shreya', name:'Shreya Doshi', cat:'thinker', tier:'A', broad:['product','people'], specific:['organizational-design','value-proposition'], oneLiner:"One of the clearest thinkers on product management and PM career growth.", detail:null },

  { id:'lenny', name:'Lenny Rachitsky', cat:'thinker', tier:'A', broad:['product','growth','marketing'], specific:['go-to-market','unit-economics','revenue-model'], oneLiner:"Deep-dives on how top companies actually built their growth engines.", detail:null },

  { id:'mike-cottmeyer', name:'Mike Cottmeyer', cat:'thinker', tier:'A', broad:['leadership','people','execution','strategy'], specific:['organizational-design','capabilities-assessment','operating-cadence'], oneLiner:"Founder of LeadingAgile (now LiminalArc). The definitive thinker on why agile fails at scale — and how to fix the org, not the team.", detail: D(
    "Founder of LeadingAgile — which he built into one of the most substantive enterprise agile transformation firms in existence before it evolved into LiminalArc. His core claim: agile adoption fails not because teams don't follow the ceremonies, but because the organizational system isn't structured to support it. Teams can't be cross-functional. Backlogs are owned by the wrong people. Dependencies are coordinated around, never eliminated. His Three Things framework names the structural preconditions that must exist before any method can work.",
    "One of the few agile thinkers who took the hard problem seriously — not 'how do teams do agile?' but 'why does agile fail when you try to scale it across a real organization?' His impediment-first diagnostic and Three Systems of Agility are indispensable for anyone building or scaling a team beyond the single-squad phase. Directly connected to LiminalArc's lineage and structurally aligned with LiminalFoundry's Gap Diagnosis.",
    ["Building your first team beyond solo: Cottmeyer's Three Things (cross-functional teams, clear backlogs, working software on cadence) are the structural test before you add headcount.",
     "Agile adoption that isn't working: The impediment-first diagnostic identifies what's blocking the basic conditions before prescribing a method.",
     "Scaling across multiple teams: The Three Systems of Agility (team, organizational, business) frame which level of the problem you're actually solving.",
     "Enterprise transformation context: His work is most directly applicable here — but the structural principles apply at any scale."],
    "Agile adoption is impossible when organizational systems and structures aren't aligned with the underlying patterns and principles that make agile work. — Mike Cottmeyer",
    ['The Gap Diagnosis','The Three-Pillar Model','OKRs','High Output Management']) },
];

let view='registry', activeCat='all', activeTier='all', activeBroad='all', activeLF=false, searchQ='';

function getCount(cid) { return ENTRIES.filter(e => e.broad.includes(cid)||e.specific.includes(cid)).length; }

function filterEntries() {
  return ENTRIES.filter(e => {
    if (activeCat!=='all' && e.cat!==activeCat) return false;
    if (activeTier!=='all' && e.tier!==activeTier) return false;
    if (activeLF && !e.lf) return false;
    if (activeBroad!=='all' && !e.broad.includes(activeBroad) && !e.specific.includes(activeBroad)) return false;
    if (searchQ) { const q=searchQ.toLowerCase(); const h=[e.name,e.abbr||'',e.author||'',...e.broad,...e.specific,e.oneLiner].join(' ').toLowerCase(); if(!h.includes(q)) return false; }
    return true;
  });
}

function renderRegistry() {
  const filtered = filterEntries();
  document.getElementById('countBadge').textContent = filtered.length+' of '+ENTRIES.length+' entries';
  const grid = document.getElementById('grid');
  if (!filtered.length) { grid.innerHTML='<div class="empty">No entries match your filters.</div>'; return; }
  grid.innerHTML = filtered.map(e => {
    const bTags = e.broad.slice(0,2).map(t=>`<span class="ctag ctag-broad">${t}</span>`).join('');
    const sTags = e.specific.slice(0,2).map(t=>`<span class="ctag ctag-spec">${t}</span>`).join('');
    return `<div class="card cat-${e.cat}${e.lf?' is-lf':''}" data-id="${e.id}" role="button" tabindex="0">
      <div class="card-meta">
        <span class="cat-badge">${CAT_LABEL[e.cat]}</span>
        <span class="tier-badge tier-${e.tier.toLowerCase()}">${e.tier}</span>
        ${e.lf?'<span class="lf-badge">🔥 LiminalFoundry</span>':''}
      </div>
      <div><div class="card-name">${e.name}</div>${e.author?`<div class="card-author">${e.author}</div>`:''}</div>
      <div class="card-oneliner">${e.oneLiner}</div>
      <div class="card-concepts">${bTags}${sTags}</div>
      <div class="card-cta ${e.detail?'has-entry':''}">${e.detail?'▸ View full brief':'· Entry coming soon'}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click',()=>openModal(c.dataset.id));
    c.addEventListener('keydown',ev=>{if(ev.key==='Enter')openModal(c.dataset.id);});
  });
}

function renderConcepts() {
  const wrap=document.getElementById('conceptsWrap');
  const q=searchQ.toLowerCase();
  const filt=c=>!q||c.name.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q);
  const broad=CONCEPTS_DATA.filter(c=>c.type==='broad'&&filt(c));
  const spec=CONCEPTS_DATA.filter(c=>c.type==='specific'&&filt(c));
  document.getElementById('countBadge').textContent=(broad.length+spec.length)+' of '+CONCEPTS_DATA.length+' concepts';
  const makeCard=c=>`<div class="concept-card ${c.type}-card" data-concept="${c.id}" role="button" tabindex="0">
    <div class="concept-card-head"><div class="concept-card-name">${c.name}</div><span class="entry-count">${getCount(c.id)} entries</span></div>
    <div class="concept-card-desc">${c.desc}</div>
    <div class="concept-stage-row">${c.stages.map(s=>`<span class="stage-dot">${STAGE_LABELS[s]||s}</span>`).join('')}</div>
  </div>`;
  wrap.innerHTML=`
    <div class="concept-section">
      <div class="concept-section-header"><div class="concept-section-title">Broad Concepts</div><span class="concept-section-pill broad-pill">Chapters</span><span class="concept-section-sub">High-level domains — always-applicable orientation</span></div>
      <div class="concept-grid">${broad.map(makeCard).join('')||'<div class="empty">No broad concepts match.</div>'}</div>
    </div>
    <div class="concept-section">
      <div class="concept-section-header"><div class="concept-section-title">Specific Concepts</div><span class="concept-section-pill spec-pill">Deep dives</span><span class="concept-section-sub">Granular ideas — pull when the situation calls for it</span></div>
      <div class="concept-grid">${spec.map(makeCard).join('')||'<div class="empty">No specific concepts match.</div>'}</div>
    </div>`;
  wrap.querySelectorAll('.concept-card').forEach(card=>{
    card.addEventListener('click',()=>{
      activeBroad=card.dataset.concept; activeLF=false;
      document.querySelectorAll('[data-broad]').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-broad="all"]')?.classList.remove('active');
      document.querySelector('[data-lf]')?.classList.remove('active');
      switchView('registry'); renderRegistry();
    });
    card.addEventListener('keydown',ev=>{if(ev.key==='Enter')card.click();});
  });
}

function switchView(v) {
  view=v;
  document.getElementById('registryPanel').classList.toggle('active',v==='registry');
  document.getElementById('conceptsPanel').classList.toggle('active',v==='concepts');
  document.getElementById('tabRegistry').classList.toggle('active',v==='registry');
  document.getElementById('tabConcepts').classList.toggle('active',v==='concepts');
  if(v==='registry') renderRegistry(); else renderConcepts();
}

function openModal(id) {
  const e=ENTRIES.find(x=>x.id===id); if(!e) return;
  document.getElementById('modalBadges').innerHTML=
    `<span class="cat-badge cat-${e.cat}" style="font-size:10px;padding:3px 7px">${CAT_LABEL[e.cat]}</span>
     <span class="tier-badge tier-${e.tier.toLowerCase()}">${e.tier} — ${TIER_LABEL[e.tier]}</span>
     ${e.lf?'<span class="lf-badge">🔥 LiminalFoundry</span>':''}`;
  document.getElementById('modalTitle').textContent=e.name;
  document.getElementById('modalAuthor').textContent=e.author?'by '+e.author:'';
  document.getElementById('modalConcepts').innerHTML=
    e.broad.map(t=>`<span class="ctag ctag-broad">${t}</span>`).join('')+
    e.specific.map(t=>`<span class="ctag ctag-spec">${t}</span>`).join('');
  const body=document.getElementById('modalBody');
  if(!e.detail) {
    body.innerHTML=`<div class="no-detail"><div style="font-size:20px;margin-bottom:8px">📝</div><strong>Entry in progress</strong><br><br>In the manifest but the full brief hasn't been written yet. Ask to fill it in anytime.</div>`;
  } else {
    const d=e.detail;
    body.innerHTML=`
      <div class="section"><div class="section-label">The Gist</div><div class="section-text">${d.gist}</div></div>
      <div class="section"><div class="section-label">Why It Matters</div><div class="section-text">${d.why}</div></div>
      <div class="section"><div class="section-label">When to Deploy</div><ul class="when-list">${d.when.map(w=>`<li>${w}</li>`).join('')}</ul></div>
      <div class="section"><div class="section-label">The Money Quote</div><div class="quote-block">"${d.quote}"</div></div>
      ${d.seeAlso?.length?`<div class="section"><div class="section-label">See Also</div><div class="see-also">${d.seeAlso.map(s=>`<span class="see-also-link">→ ${s}</span>`).join('')}</div></div>`:''}`;
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow=''; }

document.getElementById('tabRegistry').addEventListener('click',()=>switchView('registry'));
document.getElementById('tabConcepts').addEventListener('click',()=>switchView('concepts'));
document.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); activeCat=b.dataset.cat; renderRegistry();
}));
document.querySelectorAll('[data-tier]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-tier]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); activeTier=b.dataset.tier; renderRegistry();
}));
document.querySelectorAll('[data-lf]').forEach(b=>b.addEventListener('click',()=>{
  activeLF=!activeLF; b.classList.toggle('active',activeLF); renderRegistry();
}));
document.querySelectorAll('[data-broad]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-broad]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); activeBroad=b.dataset.broad; renderRegistry();
}));
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.trim(); if(view==='registry') renderRegistry(); else renderConcepts();});
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderRegistry();
</script>
</body>
</html>
